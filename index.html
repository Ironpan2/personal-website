<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironpan OS | Terminal</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff; /* Changed to stark white */
            --dim: #cccccc; /* Light grey for standard output */
            --font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: var(--dim) var(--bg);
        }

        #terminal {
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            color: var(--text);
            margin-right: 10px;
            font-weight: bold;
        }

        #command-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }

        .output {
            margin-top: 5px;
            color: var(--dim);
            line-height: 1.4;
        }

        .command-text {
            color: var(--text);
            font-weight: bold;
        }

        .system-msg {
            color: #ffffff;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        /* CRT Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.02));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="output system-msg">
Ironpan Softworks(TM) Kernel Booting...
Version 1.0.2-RUST_LEARNER
Connected to: ironpan2.vercel.app
Type 'help' to see available commands.
        </div>
        
        <div id="input-container" class="input-line">
            <span class="prompt">ironpan2@guest:~$</span>
            <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const inputContainer = document.getElementById('input-container');
        const input = document.getElementById('command-input');

        const COMMANDS = {
            help: "Available commands: <br> - <span class='command-text'>whoisironpan</span>: About me <br> - <span class='command-text'>projects</span>: View my projects <br> - <span class='command-text'>discord</span>: Join the server <br> - <span class='command-text'>github</span>: View my code <br> - <span class='command-text'>clear</span>: Clean the screen",
            whoisironpan: "Hello, I am ironpan2. I like computers game cheating and sometimes chess. I know some basic python and I am learning rust.",
            projects: "My Projects: <br> - <span class='command-text'>Ironc</span>: A simple cli calculator in rust it can add, multiply, subtract, divide, square, and square root you can see and download the code if you go to my github.",
            discord: "Redirecting to Discord...",
            github: "Opening GitHub Profile...",
            clear: "clear"
        };

        const LINKS = {
            discord: "https://discord.gg/BGmDcqwW9g",
            github: "https://github.com/Ironpan2"
        };

        function printLine(text) {
            const div = document.createElement('div');
            div.className = 'output';
            div.innerHTML = text;
            terminal.insertBefore(div, inputContainer);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const fullCommand = input.value.trim().toLowerCase();
                
                // Print the prompt and what the user typed
                printLine(`<span class="prompt">ironpan2@guest:~$</span> <span style="color: #ffffff;">${fullCommand}</span>`);
                
                // Secret destructive command check
                if (fullCommand.includes('rm -rf') || fullCommand.includes('rm -f *')) {
                    printLine("rm: removing root filesystem...");
                    input.disabled = true; // Lock the terminal
                    
                    // Simulate deletion and crash
                    setTimeout(() => {
                        document.body.innerHTML = ""; // Deletes everything
                        document.body.style.backgroundColor = "#000000";
                        
                        // Fake Kernel Panic
                        setTimeout(() => {
                            document.body.innerHTML = `
                                <div style='color: red; padding: 20px; font-family: monospace; z-index: 10; position: relative;'>
                                    [  1.002341] Kernel panic - not syncing: VFS: Unable to mount root fs on unknown-block(0,0)<br>
                                    [  1.002385] CPU: 0 PID: 1 Comm: init Not tainted 5.15.0-generic<br>
                                    [  1.002411] Hardware name: Ironpan Softworks Virtual Machine<br>
                                    [  1.002444] Call Trace:<br>
                                    [  1.002480]  dump_stack+0x10/0x20<br>
                                    [  1.002521]  panic+0x120/0x2a0<br>
                                    SYSTEM HALTED.
                                </div>`;
                        }, 500);
                    }, 800);
                    return;
                }

                // Normal command execution
                if (COMMANDS[fullCommand]) {
                    if (fullCommand === 'clear') {
                        const allOutputs = document.querySelectorAll('.output:not(.system-msg)');
                        allOutputs.forEach(el => el.remove());
                    } else {
                        printLine(COMMANDS[fullCommand]);
                        
                        if (LINKS[fullCommand]) {
                            setTimeout(() => {
                                window.open(LINKS[fullCommand], '_blank');
                            }, 1000);
                        }
                    }
                } else if (fullCommand !== "") {
                    printLine(`Command not found: ${fullCommand}. Type 'help' for assistance.`);
                }

                input.value = '';
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
