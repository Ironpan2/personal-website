<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Mother's Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf6ee;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* Soft petal background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(255, 200, 180, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 80%, rgba(210, 170, 200, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 230, 210, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 680px;
      max-width: 95vw;
      background: #fff9f4;
      border: 1.5px solid rgba(200, 160, 140, 0.3);
      border-radius: 4px;
      padding: 60px 64px 52px;
      box-shadow:
        0 2px 40px rgba(180, 120, 100, 0.08),
        0 0 0 8px rgba(255, 245, 238, 0.9),
        0 0 0 10px rgba(200, 160, 140, 0.15);
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner florals */
    .card::before, .card::after {
      content: '✿';
      position: absolute;
      font-size: 22px;
      color: rgba(200, 140, 120, 0.35);
    }
    .card::before { top: 18px; left: 22px; }
    .card::after  { bottom: 18px; right: 22px; transform: rotate(180deg); }

    .top-flourish {
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c4947a;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(190, 140, 120, 0.4), transparent);
    }
    .divider span {
      color: #c4947a;
      font-size: 16px;
    }

    .headline {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(48px, 8vw, 74px);
      color: #8b3a2a;
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 1.1s ease 0.6s both;
    }

    .subline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: #b87060;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 1s ease 0.85s both;
    }

    .message-area {
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 1s ease 1.05s both;
    }

    .message-area label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c4947a;
      margin-bottom: 10px;
    }

    .message-area textarea {
      width: 100%;
      min-height: 160px;
      border: 1px solid rgba(190, 140, 120, 0.3);
      border-radius: 3px;
      background: rgba(255, 248, 242, 0.6);
      padding: 18px 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      color: #5a3428;
      line-height: 1.75;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .message-area textarea::placeholder {
      color: rgba(180, 130, 110, 0.45);
    }

    .message-area textarea:focus {
      border-color: rgba(190, 100, 80, 0.45);
      box-shadow: 0 0 0 3px rgba(200, 120, 90, 0.07);
    }

    .footer {
      text-align: center;
      margin-top: 36px;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(160, 110, 90, 0.55);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s both;
    }

    @media print {
      body { background: white; }
      body::before { display: none; }
      .card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="top-flourish">With all my love</p>

    <div class="divider"><span>✦</span></div>

    <h1 class="headline">Happy Mother's Day,<br>Momma!</h1>
    <p class="subline">Today and every day, you are so loved.</p>

    <div class="divider"><span>✦</span></div>

    <div class="message-area">
      <label>A note from the heart</label>
      <textarea>Thank you Momma for everything you have done for me. I really appreciate all the things you have done for me. I really do love you truly — thank you for all the things you have done for me, and I hope you have a wonderful Mother's Day!</textarea>
    </div>

    <p class="footer">— With love, P.B. —</p>
  </div>

</body>
</html>
